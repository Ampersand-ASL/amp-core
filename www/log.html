<html>
    <head>
        <title>Ampersand Home Page</title>
        <link rel="stylesheet" href="main.css">
        <style>
.log-div {
    font-family: monospace;
    height: calc(100vh - 150px);
    overflow: auto;
}            
/* Terminal container */
.terminal-window {
    width: 100%;
    x-height: 100%;
    height: calc(100vh - 150px);
    background-color: #000000;
    border: 2px solid #333;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
}

/* Header bar */
.terminal-header {
    background-color: #222;
    padding: 8px 15px;
    color: #aaa;
    font-size: 13px;
    border-bottom: 1px solid #333;
}

/* The scrollable text body */
.terminal-body {
    flex: 1;
    padding: 10px;
    color: #33ff33; /* Classic terminal green */
    font-size: 14px;
    line-height: 1.25;
    overflow-y: auto; /* Enables vertical scrolling */
    white-space: pre-wrap; /* Preserves line breaks and spaces */
    word-break: break-all;
    scrollbar-color: #f1f1f1 #222; /* Format: thumb_color track_color */
}
    /* Blinking terminal cursor effect */
.cursor {
    display: inline-block;
    width: 10px;
    height: 17px;
    background-color: #33ff33;
    animation: blink 0.8s infinite;
    vertical-align: middle;
    margin-left: 0px;
}

@keyframes blink {
    0%, 49% { background-color: #33ff33; }
    50%, 100% { background-color: transparent; }
}
        </style>
    </head>
    <body>
        <div class="title-row">
            <span class="title-span">Ampersand ASL Server</span>
        </div>
        <div class="tab-row" role="tablist">
            <div class="tab" role="tab" aria-selected="false">
                <a href="/">Home</a>
            </div>
            <div class="tab" role="tab" aria-selected="false">
                <a href="config">Configuration</a>
            </div>
            <div class="tab" role="tab" aria-selected="true">
                <a href="log">Log</a>
            </div>
        </div>
        <div class="content-row" role="tabpanel">
            <div class="terminal-window">
                <div class="terminal-header">Ampersand Server Log</div>
                <!-- Content will build up inside this container -->
                <div class="terminal-body" id="output"></div>
            </div>
            <!--
            <div id="log-container" class="log-div">
            </div>
            -->
        </div> <!-- /content-row -->
        <div class="footer-row">
            <span><i><a href="https://www.qrz.com/db/KC1FSZ">Bruce MacKinnon KC1FSZ bruce@mackinnon.com</a></i></span>
        </div> <!-- /footer-row -->
    </body>
    <script>
log_state = "0";
const lineLimit = 1024;

async function log_update(initialLoad) {
    const outputDiv = document.getElementById("output");
    atBottom = Math.abs(outputDiv.scrollHeight - outputDiv.scrollTop - outputDiv.clientHeight) < 16
    if (initialLoad)
        log_state = "0";
    try {
        const response = await fetch("log-data?log_state=" + log_state);
        if (response.ok) {
            const data = await response.json();
            // Grab the cookie for next time
            log_state = data["log_state"];
            // Remove existing cursor if it exists
            const oldCursor = outputDiv.querySelector(".cursor");
            if (oldCursor) 
                oldCursor.remove();               
            // Clear all text?
            if (data["clear"])
                outputDiv.replaceChildren();
            // Prune off old lines that are above the limit
            while (outputDiv.childNodes.length > lineLimit)
                if (outputDiv.firstChild)
                    outputDiv.removeChild(outputDiv.firstChild);
            // Add new lines
            for (i of data["lines"])
                outputDiv.appendChild(document.createTextNode(`${i}\n`));
            // Create a new cursor container and insert it at the end
            const cursorSpan = document.createElement("span");
            cursorSpan.className = "cursor";
            outputDiv.appendChild(cursorSpan);
            // Auto-scroll mechanism to snap the scroll view down, but only if the user
            // was already seeing the bottom of the log.
            if (atBottom)
                outputDiv.scrollTop = outputDiv.scrollHeight;
        }
    } catch (error) {
        //console.log(error)
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    // Next update
    setInterval(async () => {
        log_update(false);
    }, 1000);
    // The initial request is for everything
    log_update(true);
});
    </script>
</html>
