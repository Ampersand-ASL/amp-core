    <script>
// ====== FORM FUNCTIONS ========================================================
function visitFormElements(node, visitor) {
    // Only consider the elements that accept user input and have a name.
    if (node.nodeType == 1 && node.name && 
        (node.type == "text" || node.type == "textarea" || node.type == "select-one" || 
         node.type == "number"))
        visitor(node)
    // Recurse ...
    const children = node.children;
    for (let child of children)
        visitFormElements(child, visitor);
}

// Takes a JSON object and populates the form field values. If the 
// form contains an element that is not in the JSON object that element
// is disabled.
function setFormFromData(rootNode, data) {
    visitFormElements(rootNode, el => {
        if (el.name in data) {
            el.value = data[el.name];
        } else {
            el.value = null;
            el.disabled = true;
        }
        // Manually fire the change event in case there are any dependencies
        el.dispatchEvent(new Event("change", { bubbles: true }));
    });
}

// Scans the form and moves the value of any named input element into the data object
function getDataFromForm(rootNode, data) {
    const formData = new FormData(rootNode);
    const formObject = Object.fromEntries(formData.entries());
    for (name in formObject)
        data[name] = formObject[name].trim();
}

async function setupForm(rootNode) {
    
    loadPromises = []

    // Scan through the form and get setup. This includes:
    // 1. Fetching choices for any top-level menus
    // 2. Installing the necessary change callbacks to deal with dependencies
    visitFormElements(rootNode, el => {
        // Does the element point to a dependent?
        if (el.dataset.listdependson) {
            // If the list doesn't depend on anything then force a load
            // immediately.
            if (el.dataset.listdependson == "/") 
                loadPromises.push(loadSelectOptions(el, el.name));
            // If the list depends on something else then search for the dependency 
            // and install a change callback
            else {
                visitFormElements(rootNode, el2 => {
                    if (el2.name == el.dataset.listdependson) {
                        el2.addEventListener("change", event => {
                            loadSelectOptions(el, el.name, el2.value);
                        });
                    }
                });
            }
        }
    });
    // Don't return until all of the immediate loads have completed
    return await Promise.allSettled(loadPromises);
}

/**
 * A utility function for populating the options on a select menu
 * using choices provided by the back-end.
 * 
 * @param selectEl The element being configured. Usually a <select>
 * @param selectName The ID of the select menu and also the name argument 
 * sent to the server.
 * @param args Optional arguments that can influence the list
 */
async function loadSelectOptions(selectEl, selectName, arg) {

    try {
        u = "config-select-options?name=" + selectName;
        if (arg)
            u += "&arg=" + arg
        const response = await fetch(u);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const data = await response.json();
        // Clear existing options
        selectEl.replaceChildren();
        // Add new options 
        if (data.length > 0) {
            selectEl.disabled = false;
            for (const i of data) {
                var opt = document.createElement('option');
                opt.value = i["value"]
                opt.innerHTML = i["desc"]
                selectEl.appendChild(opt);
            }
            // Since the menu has undergone a re-build we need to restore the value 
            // to what we received last.
            fullConfig = JSON.parse(sessionStorage.getItem("config"));
            if (selectEl.name in fullConfig)
                selectEl.value = fullConfig[selectEl.name];
        }
        else {
            selectEl.disabled = true;
            selectEl.value = null;
        }
    } catch (error) {
        console.error('Error fetching data:', error.message);
    }
}

// ====== FORM FUNCTIONS ========================================================

//const form = document.getElementById('config-form');
//setupForm(form);
//setFormFromData(form, { "node": "xxx", "aslAudioDevice": "0", "aslCosDevice": "0" });

// Loads data into the configuration screen
async function configLoad() {
    try {
        const response = await fetch('config-load');
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const data = await response.json();

        // Store the entire config document so that we can merge later
        sessionStorage.setItem("config", JSON.stringify(data))

        // Here is where the JSON data gets moved into the form DOM
        setFormFromData(document.getElementById('config-form'), data);

    } catch (error) {
        console.error('Error fetching configuration data:', error.message);
    }
}

function configStore() {

    // Make a deep copy of the existing config state
    fullConfig = JSON.parse(sessionStorage.getItem("config"))

    // Augment with whatever is in the screen
    const form = document.getElementById('config-form');
    getDataFromForm(form, fullConfig)

    // Push back to the server
    fetch('/config-save', {
        method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(fullConfig, null, 2)
        }
    );
}

function programSA818(radioId) {

    if (radioId != 0 && radioId != 1)
        return;

    const form = document.getElementById('config-form');
    const formData = new FormData(form);
    const formObject = Object.fromEntries(formData.entries());

    // Pull out the relevant radio parameters
    param = { 
        "radio": radioId
    };
    for (var i = 0; i < RadioControls[0].length; i++)
        // Always using the "plain" radio 0 names
        param[RadioControls[0][i]] = formObject[RadioControls[radioId][i]];

    fetch('/program-sa818', {
        method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(param, null, 2)
        }
    ).then((response) => {
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        // Returns a promise for the parsed JSON
        return response.json(); 
    }).then(data => {
        
        msgDiv = document.getElementById("program-" + radioId + "-message-div");
        msgDiv.className = "message-div";
        msgSpan = document.getElementById("program-" + radioId + "-message");

        if (data["status"] == "ok") {
            msgSpan.innerHTML = "Program OK";
        } else if (data["status"] == "fail") {
            msgSpan.innerHTML = data["msg"];
            msgDiv.classList.add("message-alert");
        }
    });
}

document.addEventListener('DOMContentLoaded', async() => {

    document.getElementById('config-form').addEventListener('submit', function (event) {
        event.preventDefault();
        console.log(event.submitter.value)
        if (event.submitter.value == "Save")
            configStore();
        else if (event.submitter.value == "Program Radio 0")
            programSA818(0);
        else if (event.submitter.value == "Program Radio 1")
            programSA818(1);
    });   

    const form = document.getElementById('config-form');
    // Important that these steps are serialized since the setup call 
    // is populating menu choices.
    await setupForm(form);
    await configLoad();
});
